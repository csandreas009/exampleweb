<!DOCTYPE html>
<html>
<head>
  <title>Anak Bangsa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: #333;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.2);
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>REDMITOTO</h1>
    <p>Selamat datang di website saya</p>

    <button class="btn">Klik Saya</button>

    <div class="card">
      <h3>Tentang Saya</h3>
      <p>Saya sedang belajar membuat website 🚀</p>
    </div>
  </div>
</body>
</html>
